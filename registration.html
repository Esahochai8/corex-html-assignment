<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corex Newsletter Registration</title>
</head>
<body>

  <!-- Main -->

  <main>
    <div>
      <h1>Core Web Development Newsletter</h1>

      <form action="/submit" method="post"></form>
      <label for="name">Name:</label>
      <input type="text" id="name" required> 

      <br><br>

      <label for="password">Password:</label>
      <input type="password"  id="password">

      <br><br>

      <p>Experience Level</p>
      <input type="radio" name="experience" value="beginner">Beginner
      <input type="radio" name="experience" value="beginner">Intermidate

      <br><br>

      <p>Interests</p>
      <input type="checkbox" name="interest" value="HTML">HTML
      <input type="checkbox" name="interest" value="CSS">CSS
      <input type="checkbox" name="interest" value="JavaScript">JavaScript

      <br><br>

      <label>How did you hear about us?</label>
      <select name="social media" id="soocia media">
        <option>Social Media</option>
        <option>Friends</option>
        <option>Search</option>
      </select>

      <br><br>

      <label>Commments</label>
      <br><br>
      <textarea rows="4" cols="30"></textarea>

      <br><br>
      <button type="submit">Submit</button>

    </div>

    <!-- Table -->

    <div>
      <h2>Subscribers</h2>

      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Experience</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Vincent</td>
            <td>kingoveg22@gmail.com</td>
            <td>Beginner</td>
          </tr>
          <tr>
            <td>Esah</td>
            <td>esah@gmail.com</td>
            <td>Intermidate</td>
          </tr>
          <tr>
            <td colspan="3">Total Subsriber: 2</td>
          </tr>
        </tbody>
      </table>
    </div>

    
    <!-- Video -->
    <div>
      <h2>Learn HTML</h2>

      <iframe width="400" height="250"
      src="https://www.youtube.com/embed/UB1O30fR-EE"
      title="HTML Tutorial">
      </iframe>
    </div>
    
  </main>

  
</body>
</html>
